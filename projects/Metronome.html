<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Flash Metronome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; user-select: none; }
    #flash { position: fixed; inset: 0; opacity: 0; pointer-events: none; }
    #bpm { position: fixed; bottom: max(40px, env(safe-area-inset-bottom) + 20px); width: 100%; text-align: center; font: 700 clamp(72px, 22vw, 120px)/1 monospace; color: #fff; opacity: 0.9; }
    #color-indicator { position: fixed; top: max(20px, env(safe-area-inset-top) + 10px); width: 100%; display: flex; justify-content: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; opacity: 0.3; transition: opacity 0.2s; }
    .dot.active { opacity: 1; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="color-indicator"></div>
  <div id="bpm">120</div>
  <script>
    const FLASH_MS = 80;
    const COLORS = ['#ffffff', '#ff2020', '#20dd20', '#2080ff', '#ffe020'];

    const flash = document.getElementById('flash');
    const bpmEl = document.getElementById('bpm');
    const indicator = document.getElementById('color-indicator');

    let ctx = null, colorIdx = 0;
    let bpm = 60, playing = false, timer = null, flashTimer = null;
    let dragStartX = null, dragStartY = null, dragStartBPM = bpm, dragging = false, dragAxis = null;

    COLORS.forEach((c, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.style.background = c;
      indicator.appendChild(dot);
    });

    function updateColor() {
      flash.style.background = COLORS[colorIdx];
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === colorIdx));
    }

    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume();
      return ctx;
    }

    function unlockAudio() {
      const c = getCtx();
      const buf = c.createBuffer(1, 1, 22050);
      const src = c.createBufferSource();
      src.buffer = buf;
      src.connect(c.destination);
      src.start();
    }

    function beep() {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.frequency.value = 1000;
      gain.gain.setValueAtTime(0.3, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.05);
      osc.start(); osc.stop(c.currentTime + 0.05);
    }

    function doFlash() {
      clearTimeout(flashTimer);
      flash.style.opacity = 1;
      flashTimer = setTimeout(() => flash.style.opacity = 0, FLASH_MS);
      beep();
    }

    function start() {
      clearInterval(timer);
      doFlash();
      timer = setInterval(doFlash, 60000 / bpm);
    }

    function stop() {
      clearInterval(timer);
      clearTimeout(flashTimer);
      flash.style.opacity = 0;
    }

    function setBPM(val) {
      bpm = Math.round(Math.max(20, Math.min(300, val)));
      bpmEl.textContent = bpm;
    }

    document.addEventListener('touchstart', e => {
      e.preventDefault();
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      dragStartBPM = bpm;
      dragging = false;
      dragAxis = null;
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      e.preventDefault();
      const x = e.touches[0].clientX;
      const y = e.touches[0].clientY;
      const dx = x - dragStartX;
      const dy = y - dragStartY;

      if (!dragAxis && Math.sqrt(dx*dx + dy*dy) > 10) {
        dragAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        dragging = true;
        if (dragAxis === 'x') stop();
      }

      if (dragAxis === 'x') setBPM(dragStartBPM - dx * 0.5);
    }, { passive: false });

    document.addEventListener('touchend', e => {
      e.preventDefault();
      unlockAudio();
      if (!dragging) {
        playing = !playing; playing ? start() : stop();
      } else if (dragAxis === 'y') {
        const dy = e.changedTouches[0].clientY - dragStartY;
        colorIdx = (colorIdx + (dy > 0 ? 1 : -1) + COLORS.length) % COLORS.length;
        updateColor();
        if (playing) start();
      } else if (playing) {
        start();
      }
      dragStartX = null; dragStartY = null; dragging = false; dragAxis = null;
    }, { passive: false });

    document.addEventListener('mousedown', e => { dragStartX = e.clientX; dragStartY = e.clientY; dragStartBPM = bpm; dragging = false; dragAxis = null; });
    document.addEventListener('mousemove', e => {
      if (dragStartX === null) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (!dragAxis && Math.sqrt(dx*dx + dy*dy) > 10) {
        dragAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        dragging = true;
        if (dragAxis === 'x') stop();
      }
      if (dragAxis === 'x') setBPM(dragStartBPM - dx * 0.5);
    });
    document.addEventListener('mouseup', e => {
      if (!dragging) { playing = !playing; playing ? start() : stop(); }
      else if (dragAxis === 'y') {
        const dy = e.clientY - dragStartY;
        colorIdx = (colorIdx + (dy > 0 ? 1 : -1) + COLORS.length) % COLORS.length;
        updateColor();
        if (playing) start();
      } else if (playing) start();
      dragStartX = null; dragStartY = null; dragging = false; dragAxis = null;
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); playing = !playing; playing ? start() : stop(); }
      if (e.code === 'ArrowRight') { setBPM(bpm + 1); if (playing) start(); }
      if (e.code === 'ArrowLeft') { setBPM(bpm - 1); if (playing) start(); }
      if (e.code === 'ArrowUp') { colorIdx = (colorIdx - 1 + COLORS.length) % COLORS.length; updateColor(); }
      if (e.code === 'ArrowDown') { colorIdx = (colorIdx + 1) % COLORS.length; updateColor(); }
    });

    updateColor();
  </script>
</body>
</html>
