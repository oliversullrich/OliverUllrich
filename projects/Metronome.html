<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Flash Metronome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; user-select: none; }
    #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
    #bpm { position: fixed; bottom: max(40px, env(safe-area-inset-bottom) + 20px); width: 100%; text-align: center; font: 700 clamp(72px, 22vw, 120px)/1 monospace; color: #fff; opacity: 0.9; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="bpm">120</div>
  <script>
    const FLASH_MS = 80;
    const SENSITIVITY = 0.5;

    const flash = document.getElementById('flash');
    const bpmEl = document.getElementById('bpm');
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    let bpm = 120, playing = false, timer = null, flashTimer = null;
    let dragStartX = null, dragStartBPM = bpm, dragging = false;

    function beep() {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 1000;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      osc.start(); osc.stop(ctx.currentTime + 0.05);
    }

    function doFlash() {
      clearTimeout(flashTimer);
      flash.style.opacity = 1;
      flashTimer = setTimeout(() => flash.style.opacity = 0, FLASH_MS);
      beep();
    }

    function start() {
      clearInterval(timer);
      doFlash();
      timer = setInterval(doFlash, 60000 / bpm);
    }

    function stop() {
      clearInterval(timer);
      clearTimeout(flashTimer);
      flash.style.opacity = 0;
    }

    function setBPM(val) {
      bpm = Math.round(Math.max(20, Math.min(300, val)));
      bpmEl.textContent = bpm;
    }

    document.addEventListener('touchstart', e => {
      e.preventDefault();
      dragStartX = e.touches[0].clientX; dragStartBPM = bpm; dragging = false;
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      e.preventDefault();
      const x = e.touches[0].clientX;
      if (!dragging && Math.abs(x - dragStartX) > 10) { dragging = true; stop(); }
      if (dragging) setBPM(dragStartBPM + (x - dragStartX) * SENSITIVITY);
    }, { passive: false });

    document.addEventListener('touchend', e => {
      e.preventDefault();
      if (!dragging) { ctx.resume(); playing = !playing; playing ? start() : stop(); }
      else if (playing) start();
      dragStartX = null; dragging = false;
    }, { passive: false });

    document.addEventListener('mousedown', e => { dragStartX = e.clientX; dragStartBPM = bpm; dragging = false; });
    document.addEventListener('mousemove', e => {
      if (dragStartX === null) return;
      if (!dragging && Math.abs(e.clientX - dragStartX) > 10) { dragging = true; stop(); }
      if (dragging) setBPM(dragStartBPM + (e.clientX - dragStartX) * SENSITIVITY);
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) { ctx.resume(); playing = !playing; playing ? start() : stop(); }
      else if (playing) start();
      dragStartX = null; dragging = false;
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); ctx.resume(); playing = !playing; playing ? start() : stop(); }
      if (e.code === 'ArrowRight') { setBPM(bpm + 1); if (playing) start(); }
      if (e.code === 'ArrowLeft') { setBPM(bpm - 1); if (playing) start(); }
    });
  </script>
</body>
</html>
