<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flash Metronome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; user-select: none; }
    #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
    #bpm { position: fixed; bottom: 80px; width: 100%; text-align: center; font: 700 100px/1 monospace; color: #fff; opacity: 0.9; }
    #sound-toggle { position: fixed; bottom: 30px; width: 100%; text-align: center; font: 400 14px/1 monospace; color: rgba(255,255,255,0.4); letter-spacing: 0.2em; cursor: pointer; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="bpm">120</div>
  <div id="sound-toggle">BEEP</div>
  <script>
    const FLASH_MS = 80;
    const SENSITIVITY = 0.35;

    const flash = document.getElementById('flash');
    const bpmEl = document.getElementById('bpm');
    const toggleEl = document.getElementById('sound-toggle');

    let bpm = 120, playing = false, timer = null, flashTimer = null;
    let dragStartX = null, dragStartBPM = bpm, dragging = false;
    let soundMode = 'beep';
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 1000;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      osc.start(); osc.stop(ctx.currentTime + 0.05);
    }

    function playClick() {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      src.buffer = buf;
      src.connect(gain); gain.connect(ctx.destination);
      gain.gain.value = 1.5;
      src.start();
    }

    function doFlash() {
      clearTimeout(flashTimer);
      flash.style.opacity = 1;
      flashTimer = setTimeout(() => flash.style.opacity = 0, FLASH_MS);
      if (soundMode === 'beep') playBeep(); else playClick();
    }

    function start() {
      clearInterval(timer);
      doFlash();
      timer = setInterval(doFlash, 60000 / bpm);
    }

    function stop() {
      clearInterval(timer);
      clearTimeout(flashTimer);
      flash.style.opacity = 0;
    }

    function setBPM(val) {
      bpm = Math.round(Math.max(20, Math.min(300, val)));
      bpmEl.textContent = bpm;
    }

    toggleEl.addEventListener('click', e => {
      e.stopPropagation();
      soundMode = soundMode === 'beep' ? 'click' : 'beep';
      toggleEl.textContent = soundMode.toUpperCase();
    });

    document.addEventListener('mousedown', e => { if (e.target === toggleEl) return; dragStartX = e.clientX; dragStartBPM = bpm; dragging = false; });
    document.addEventListener('touchstart', e => { if (e.target === toggleEl) return; dragStartX = e.touches[0].clientX; dragStartBPM = bpm; dragging = false; }, { passive: true });

    document.addEventListener('mousemove', e => onMove(e.clientX));
    document.addEventListener('touchmove', e => onMove(e.touches[0].clientX), { passive: true });

    function onMove(x) {
      if (dragStartX === null) return;
      if (!dragging && Math.abs(x - dragStartX) > 8) { dragging = true; stop(); }
      if (dragging) setBPM(dragStartBPM + (x - dragStartX) * SENSITIVITY);
    }

    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);

    function onUp(e) {
      if (e.target === toggleEl) return;
      if (!dragging) { ctx.resume(); playing = !playing; playing ? start() : stop(); }
      else if (playing) start();
      dragStartX = null; dragging = false;
    }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); ctx.resume(); playing = !playing; playing ? start() : stop(); }
      if (e.code === 'ArrowRight') { setBPM(bpm + 1); if (playing) start(); }
      if (e.code === 'ArrowLeft') { setBPM(bpm - 1); if (playing) start(); }
    });
  </script>
</body>
</html>
